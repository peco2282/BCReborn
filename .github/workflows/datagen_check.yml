name: Data Generation Check

on:
  pull_request:
    branches: [ main ]

jobs:
  check-datagen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Data Generation
        run: ./gradlew runData

      - name: Check for changes in generated resources
        run: |
          if [ -n "$(git status --porcelain src/generated/resources)" ]; then
            echo "Data generation produced changes that were not committed."
            git status --porcelain src/generated/resources
            exit 1
          fi
